<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>主页｜盖章系统原型</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="prototype-page">

    <header class="prototype-toolbar">
      <h1>主页</h1>

      <div class="toolbar-actions">
        <a class="toolbar-button" href="index.html">
          返回封面
        </a>

        <button
          class="toolbar-button"
          type="button"
          onclick="toggleDebug()"
        >
          显示点击区域
        </button>

        <button
          class="toolbar-button"
          type="button"
          onclick="toggleFullscreen()"
        >
          全屏查看
        </button>
      </div>
    </header>

    <section
      id="prototype"
      class="prototype-container"
    >
      <img
        class="prototype-image"
        src="images/Picture1-1.png"
        alt="盖章系统主页原型"
      >

      <!-- 点击“我的申请” -->
      <a
        class="hotspot"
        href="my-application.html"
        aria-label="进入我的申请页"

        style="
          left: 5%;
          top: 18%;
          width: 10%;
          height: 5%;
        "
      ></a>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
