<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>单据详情｜盖章系统原型</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="prototype-page">

    <header class="prototype-toolbar">
      <h1>单据详情</h1>

      <div class="toolbar-actions">
        <a
          class="toolbar-button"
          href="my-application.html"
        >
          返回我的申请
        </a>

        <button
          class="toolbar-button"
          type="button"
          onclick="toggleDebug()"
        >
          显示点击区域
        </button>

        <button
          class="toolbar-button"
          type="button"
          onclick="toggleFullscreen()"
        >
          全屏查看
        </button>
      </div>
    </header>

    <section
      id="prototype"
      class="prototype-container"
    >
      <img
        class="prototype-image"
        src="images/Picture2-1-1.png"
        alt="单据详情页原型"
      >

      <!-- 点击“我的草稿” -->
      <a
        class="hotspot"
        href="Page2-1.html"
        aria-label="进入我的申请"

        style="
          left: 13%;
          top: 10%;
          width: 9%;
          height: 4%;
        "
      ></a>

      <!-- 点击“我的申请” -->

        class="hotspot"
        href="Page2-2.html"
        aria-label="进入我的申请"

        style="

          width: 9%;
          height: 4%;
        "
      ></a>

      <!-- 点击“待我审批” -->
      <a
        class="hotspot"

        aria-label="进入营业执照"

        style="
          left: 13%;

          width: 9%;
          height: 4%;
        "
      ></a>
      
      <!-- 点击“提交” -->
      <a
        class="hotspot"
        href="Page2-1-2.html"
        aria-label="进入提交"

        style="

          width: 6%;
          height: 3%;
        "
      ></a>
      
      <!-- 点击“业务申请” -->
      <a
        class="hotspot"

        aria-label="进入所有流程"

        style="

          height: 5%;
        "
      ></a>  

    <!-- 点击“返回” -->
      <a
        class="hotspot"

        aria-label="进入所有流程"

        style="

          height: 3%;
        "
      ></a> 

          <!-- 点击“返回” -->
      <a

    </section>
