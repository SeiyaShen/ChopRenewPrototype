<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>单据详情｜盖章系统原型</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="prototype-page">

    <header class="prototype-toolbar">
      <h1>单据详情</h1>

      <div class="toolbar-actions">
        <a
          class="toolbar-button"
          href="my-application.html"
        >
          返回我的申请
        </a>

        <button
          class="toolbar-button"
          type="button"
          onclick="toggleDebug()"
        >
          显示点击区域
        </button>

        <button
          class="toolbar-button"
          type="button"
          onclick="toggleFullscreen()"
        >
          全屏查看
        </button>
      </div>
    </header>

    <section
      id="prototype"
      class="prototype-container"
    >
      <img
        class="prototype-image"
        src="images/Picture2-2.png"
        alt="单据详情页原型"
      >

      <!-- 点击“合同” -->
      <a
        class="hotspot"
        href="page2-1.html"
        aria-label="进入合同"

        style="
          left: 15%;
          top: 16%;
          width: 9%;
          height: 4%;
        "
      ></a>

      <!-- 点击“营业执照” -->
      <a
        class="hotspot"
        href="Page2-3.html"
        aria-label="进入营业执照"

        style="
          left: 15%;
          top: 29%;
          width: 9%;
          height: 4%;
        "
      ></a>
      
      <!-- 点击“首页” -->
      <a
        class="hotspot"
        href="home.html"
        aria-label="进入首页"

        style="
          left: 2%;
          top: 12%;
          width: 8%;
          height: 4%;
        "
      ></a>  

      <!-- 点击“部门业务文件” -->
      <a
        class="hotspot"
        href="Page2-1-1.html"
        aria-label="进入部门业务文件"

        style="
          left: 69%;
          top: 76%;
          width: 16%;
          height: 18%;
        "
      ></a>        

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
