<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>单据详情｜盖章系统原型</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="prototype-page">

    <header class="prototype-toolbar">
      <h1>单据详情</h1>

      <div class="toolbar-actions">
        <a
          class="toolbar-button"
          href="my-application.html"
        >
          返回我的申请
        </a>

        <button
          class="toolbar-button"
          type="button"
          onclick="toggleDebug()"
        >
          显示点击区域
        </button>

        <button
          class="toolbar-button"
          type="button"
          onclick="toggleFullscreen()"
        >
          全屏查看
        </button>
      </div>
    </header>

    <section
      id="prototype"
      class="prototype-container"
    >
      <img
        class="prototype-image"
        src="images/Picture2-1-3.png"
        alt="单据详情页原型"
      >

      <!-- 点击“我的草稿” -->
      <a
        class="hotspot"
        href="home.html"
        aria-label="进入我的申请"

        style="
          left: 12%;
          top: 12%;
          width: 9%;
          height: 4%;
        "
      ></a>

      <!-- 点击“我的申请” -->
      <a
        class="hotspot"
        href="Page1-2.html"
        aria-label="进入我的申请"

        style="
          left: 12%;
          top: 17%;
          width: 9%;
          height: 4%;
        "
      ></a>

      <!-- 点击“待我审批” -->
      <a
        class="hotspot"
        href="Page1-3.html"
        aria-label="进入待我审批"

        style="
          left: 12%;
          top: 23%;
          width: 9%;
          height: 4%;
        "
      ></a>
      
      <!-- 点击“我已审批” -->
      <a
        class="hotspot"
        href="Page1-4.html"
        aria-label="进入我已审批"

        style="
          left: 12%;
          top: 28%;
          width: 9%;
          height: 4%;
        "
      ></a>

      <!-- 点击“我的汇总” -->
      <a
        class="hotspot"
        href="Page1-5.html"
        aria-label="进入我的汇总"

        style="
          left: 12%;
          top: 34%;
          width: 9%;
          height: 4%;
        "
      ></a>
      
      <!-- 点击“所有流程” -->
      <a
        class="hotspot"
        href="Page1-6.html"
        aria-label="进入所有流程"

        style="
          left: 12%;
          top: 39%;
          width: 9%;
          height: 4%;
        "
      ></a>   
      
      <!-- 点击“业务申请” -->
      <a
        class="hotspot"
        href="Page2-1.html"
        aria-label="进入所有流程"

        style="
          left: 1%;
          top: 15%;
          width: 8%;
          height: 5%;
        "
      ></a>  

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
